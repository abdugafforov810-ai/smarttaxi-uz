<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>🚖 SmartTaxi Premium</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0b1120;
            color:white;
            overflow-x:hidden;
        }

        .sidebar{

            position:fixed;

            left:0;
            top:0;

            width:340px;
            height:100vh;

            background:#111827;

            padding:25px;

            overflow-y:auto;

            z-index:1000;
        }

        .logo{

            font-size:34px;
            font-weight:bold;

            margin-bottom:25px;

            color:#38bdf8;
        }

        .card{

            background:#1e293b;

            border-radius:24px;

            padding:22px;

            margin-bottom:20px;

            animation:fade 0.5s ease;
        }

        .card h2{
            margin-bottom:15px;
        }

        .number{

            font-size:42px;
            font-weight:bold;
            color:#38bdf8;
        }

        input,
        select{

            width:100%;

            margin-top:12px;

            padding:15px;

            border:none;

            border-radius:16px;

            background:#334155;

            color:white;

            outline:none;
        }

        button{

            width:100%;

            margin-top:15px;

            padding:15px;

            border:none;

            border-radius:18px;

            cursor:pointer;

            font-size:16px;

            font-weight:bold;

            color:white;

            background:#38bdf8;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 10px 30px rgba(56,189,248,0.5);
        }

        #map{

            margin-left:340px;

            width:calc(100% - 340px);

            height:100vh;
        }

        .buyurtma{

            background:#334155;

            border-radius:18px;

            padding:15px;

            margin-top:15px;
        }

        .buyurtma p{
            margin-top:8px;
        }

        @keyframes fade{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🚖 SmartTaxi
    </div>

    <div class="card">

        <h2>🚕 Haydovchilar</h2>

        <div class="number">
            {{ drivers_count }}
        </div>

    </div>

    <div class="card">

        <h2>🟢 Online</h2>

        <div class="number">
            {{ online_count }}
        </div>

    </div>

    <div class="card">

        <h2>📦 Buyurtmalar</h2>

        <div class="number">
            {{ orders_count }}
        </div>

    </div>

    <div class="card">

        <h2>🚖 Taxi chaqirish</h2>

        <input
            type="text"
            id="customer"
            placeholder="Mijoz ismi"
        >

        <select id="from">

            <option value="">
                📍 Qayerdan
            </option>

            <option value="Magic City">
                Magic City
            </option>

            <option value="Chorsu">
                Chorsu
            </option>

        </select>

        <select id="to">

            <option value="">
                🏁 Qayerga
            </option>

            <option value="Tashkent City">
                Tashkent City
            </option>

            <option value="Airport">
                Airport
            </option>

        </select>

        <button onclick="createOrder()">
            🚖 Buyurtma berish
        </button>

    </div>

    <div class="card">

        <h2>📋 Jonli buyurtmalar</h2>

        <div id="orders"></div>

    </div>

</div>

<div id="map"></div>

<script>

    let map;

    let markers = {};

    async function initMap(){

        map = new google.maps.Map(

            document.getElementById("map"),

            {

                zoom:13,

                center:{
                    lat:41.3111,
                    lng:69.2797
                }

            }

        );

        loadDrivers();

        loadOrders();

        setInterval(()=>{

            loadDrivers();

            loadOrders();

        },3000);

    }

    async function loadDrivers(){

        const response =
            await fetch('/drivers-api/');

        const drivers =
            await response.json();

        drivers.forEach(driver => {

            const position = {

                lat:driver.lat,
                lng:driver.lng

            };

            if(markers[driver.id]){

                smoothMoveMarker(
                    markers[driver.id],
                    position
                );

            }else{

                markers[driver.id] =
                    new google.maps.Marker({

                    position:position,

                    map:map,

                    title:driver.name,

                    icon:{
                        url:'https://cdn-icons-png.flaticon.com/512/3097/3097144.png',

                        scaledSize:
                            new google.maps.Size(55,55)
                    }

                });

            }

        });

    }

    function smoothMoveMarker(marker,newPosition){

        const oldPosition =
            marker.getPosition();

        let lat =
            oldPosition.lat();

        let lng =
            oldPosition.lng();

        const deltaLat =
            (newPosition.lat - lat) / 60;

        const deltaLng =
            (newPosition.lng - lng) / 60;

        let i = 0;

        const interval = setInterval(()=>{

            lat += deltaLat;

            lng += deltaLng;

            marker.setPosition({

                lat:lat,
                lng:lng

            });

            i++;

            if(i >= 60){

                clearInterval(interval);

            }

        },20);

    }

    async function loadOrders(){

        const response =
            await fetch('/orders-api/');

        const orders =
            await response.json();

        const ordersDiv =
            document.getElementById('orders');

        ordersDiv.innerHTML = '';

        orders.forEach(order => {

            ordersDiv.innerHTML += `

            <div class="buyurtma">

                <p>👤 ${order.customer}</p>

                <p>📍 ${order.from}</p>

                <p>🏁 ${order.to}</p>

                <p>📦 ${order.status}</p>

            </div>

            `;

        });

    }

    async function createOrder(){

        const customer =
            document.getElementById('customer').value;

        const from =
            document.getElementById('from').value;

        const to =
            document.getElementById('to').value;

        if(!customer || !from || !to){

            alert("Ma'lumotlarni to'ldiring");

            return;
        }
        function calculatePrice(from,to){

    const fakeDistance = Math.floor(

        Math.random() * 15

    ) + 3;

    let price = 5000;

    price += fakeDistance * 3000;

    showNotification(

        "💰 " +

        price +

        " so'm | 📍 " +

        fakeDistance +

        " KM"

    );

}
function showNotification(text){

    const div =
        document.createElement('div');

    div.innerHTML = text;

    div.style.position = 'fixed';

    div.style.top = '20px';

    div.style.right = '20px';

    div.style.background = '#22c55e';

    div.style.color = 'white';

    div.style.padding = '15px 20px';

    div.style.borderRadius = '16px';

    div.style.zIndex = '9999';

    div.style.boxShadow =
        '0 0 20px rgba(34,197,94,0.5)';

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },3000);

}
        const response =
            await fetch('/create-order/',{

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({

                    customer:customer,

                    from:from,

                    to:to,

                    passengers:1,

                    taxi_type:'economy'

                })

            });

        const data =
            await response.json();

        if(data.success){

    showNotification(

        "🚖 Buyurtma yaratildi"

    );

    calculatePrice(from,to);

    loadOrders();

}

    }

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCZuXRm4xb_ZR80kkfjl3gjEiQmHVIF9UQ&callback=initMap">
</script>

</body>
</html>

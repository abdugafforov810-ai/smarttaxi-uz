<script>

    let map;
    let markers = {};

    async function initMap(){

        map = new google.maps.Map(

            document.getElementById("map"),

            {
                zoom:13,

                center:{
                    lat:41.3111,
                    lng:69.2797
                }
            }

        );

        loadDrivers();
        loadOrders();

        setInterval(()=>{

            loadDrivers();
            loadOrders();

        },3000);

    }

    async function loadDrivers(){

        const response =
            await fetch('/drivers-api/');

        const drivers =
            await response.json();

        drivers.forEach(driver => {

            const position = {

                lat:driver.lat,
                lng:driver.lng

            };

            if(markers[driver.id]){

                markers[driver.id]
                    .setPosition(position);

            }else{

                markers[driver.id] =
                    new google.maps.Marker({

                    position:position,

                    map:map,

                    title:driver.name,

                    icon:{
                        url:'https://cdn-icons-png.flaticon.com/512/3097/3097144.png',

                        scaledSize:
                        new google.maps.Size(55,55)
                    }

                });

            }

        });

    }

    async function loadOrders(){

        const response =
            await fetch('/orders-api/');

        const orders =
            await response.json();

        const ordersDiv =
            document.getElementById('orders');

        ordersDiv.innerHTML = '';

        orders.forEach(order => {

            ordersDiv.innerHTML += `

            <div class="buyurtma">

                <p>👤 ${order.customer}</p>

                <p>📍 ${order.from}</p>

                <p>🏁 ${order.to}</p>

                <p>📦 ${order.status}</p>

            </div>

            `;

        });

    }

    function showNotification(text){

        const div =
            document.createElement('div');

        div.innerHTML = text;

        div.style.position = 'fixed';

        div.style.top = '20px';

        div.style.right = '20px';

        div.style.background = '#22c55e';

        div.style.padding = '15px 20px';

        div.style.borderRadius = '16px';

        div.style.zIndex = '9999';

        document.body.appendChild(div);

        setTimeout(()=>{

            div.remove();

        },3000);

    }

    async function createOrder(){

        const customer =
            document.getElementById('customer').value;

        const from =
            document.getElementById('from').value;

        const to =
            document.getElementById('to').value;

        if(!customer || !from || !to){

            alert("Ma'lumotlarni to'ldiring");

            return;
        }

        const response =
            await fetch('/create-order/',{

                method:'POST',

                headers:{
                    'Content-Type':'application/json'
                },

                body:JSON.stringify({

                    customer:customer,
                    from:from,
                    to:to,
                    passengers:1,
                    taxi_type:'economy'

                })

            });

        const data =
            await response.json();

        if(data.success){

            showNotification(
                "🚖 Buyurtma yaratildi"
            );

            loadOrders();

        }

    }

</script>

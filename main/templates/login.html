<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>🚖 SmartTaxi Premium Login</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            background:
                linear-gradient(
                    135deg,
                    #020617,
                    #0f172a,
                    #111827
                );

            color:white;

            position:relative;
        }

        body::before{

            content:'';

            position:absolute;

            width:700px;
            height:700px;

            background:#0ea5e9;

            border-radius:50%;

            filter:blur(250px);

            opacity:0.20;

            top:-250px;
            left:-250px;
        }

        body::after{

            content:'';

            position:absolute;

            width:700px;
            height:700px;

            background:#2563eb;

            border-radius:50%;

            filter:blur(250px);

            opacity:0.20;

            bottom:-250px;
            right:-250px;
        }

        .container{

            width:1100px;

            max-width:95%;

            min-height:680px;

            display:flex;

            overflow:hidden;

            border-radius:35px;

            background:
                rgba(15,23,42,0.88);

            border:
                1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            box-shadow:
                0 0 50px rgba(14,165,233,0.2);

            position:relative;

            z-index:10;
        }

        .left{

            width:50%;

            padding:60px;

            display:flex;

            flex-direction:column;

            justify-content:space-between;

            background:
                linear-gradient(
                    rgba(2,6,23,0.75),
                    rgba(2,6,23,0.92)
                ),
                url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?q=80&w=1600&auto=format&fit=crop');

            background-size:cover;

            background-position:center;
        }

        .logo{

            font-size:55px;

            font-weight:700;

            color:#38bdf8;
        }

        .logo span{
            color:white;
        }

        .title h1{

            margin-top:40px;

            font-size:62px;

            line-height:1.1;
        }

        .title p{

            margin-top:20px;

            font-size:22px;

            color:#cbd5e1;
        }

        .stats{

            display:flex;

            gap:20px;

            margin-top:40px;
        }

        .stat{

            flex:1;

            padding:20px;

            border-radius:20px;

            background:
                rgba(255,255,255,0.08);

            border:
                1px solid rgba(255,255,255,0.08);
        }

        .stat h2{

            color:#38bdf8;

            font-size:34px;
        }

        .stat p{

            margin-top:5px;

            color:#e2e8f0;
        }

        .right{

            width:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:50px;
        }

        .login-box{

            width:100%;

            max-width:420px;
        }

        .icon{

            width:120px;
            height:120px;

            margin:auto;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:55px;

            color:#38bdf8;

            border:
                2px solid rgba(56,189,248,0.25);

            box-shadow:
                0 0 30px rgba(56,189,248,0.2);

            margin-bottom:30px;
        }

        .login-box h1{

            text-align:center;

            font-size:45px;

            margin-bottom:10px;
        }

        .login-box p{

            text-align:center;

            color:#94a3b8;

            margin-bottom:35px;
        }

        .input-box{

            margin-bottom:22px;
        }

        .input-box label{

            display:block;

            margin-bottom:10px;

            color:#e2e8f0;
        }

        .input-box input{

            width:100%;

            padding:18px;

            border:none;

            outline:none;

            border-radius:16px;

            background:#0f172a;

            color:white;

            font-size:16px;

            border:
                1px solid rgba(255,255,255,0.08);

            transition:0.3s;
        }

        .input-box input:focus{

            border:
                1px solid #38bdf8;

            box-shadow:
                0 0 20px rgba(56,189,248,0.2);
        }

        .btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:18px;

            background:
                linear-gradient(
                    90deg,
                    #06b6d4,
                    #2563eb
                );

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            margin-top:10px;
        }

        .btn:hover{

            transform:translateY(-3px);

            box-shadow:
                0 10px 30px rgba(37,99,235,0.4);
        }

        .bottom{

            text-align:center;

            margin-top:25px;

            color:#94a3b8;
        }

        .bottom a{

            color:#38bdf8;

            text-decoration:none;

            font-weight:600;
        }

        @media(max-width:900px){

            .container{
                flex-direction:column;
            }

            .left,
            .right{
                width:100%;
            }

            .left{
                min-height:350px;
            }

            .title h1{
                font-size:42px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="left">

        <div>

            <div class="logo">
                🚖 Smart<span>Taxi</span>
            </div>

            <div class="title">

                <h1>
                    TEZ.<br>
                    XAVFSIZ.<br>
                    PREMIUM.
                </h1>

                <p>
                    SmartTaxi UZ bilan
                    zamonaviy taxi tizimiga xush kelibsiz 🚀
                </p>

            </div>

        </div>

        <div class="stats">

            <div class="stat">

                <h2>1000+</h2>

                <p>Haydovchilar</p>

            </div>

            <div class="stat">

                <h2>5000+</h2>

                <p>Buyurtmalar</p>

            </div>

            <div class="stat">

                <h2>4.9 ⭐</h2>

                <p>Reyting</p>

            </div>

        </div>

    </div>

    <div class="right">

        <div class="login-box">

            <div class="icon">
                🔐
            </div>

            <h1>
                Login
            </h1>

            <p>
                Hisobingizga kiring
            </p>

            <form method="POST">

                {% csrf_token %}

                <div class="input-box">

                    <label>
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Username kiriting"
                        required
                    >

                </div>

                <div class="input-box">

                    <label>
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Password kiriting"
                        required
                    >

                </div>

                <button
                    type="submit"
                    class="btn"
                >
                    Kirish 🚀
                </button>

            </form>

            <div class="bottom">

                Hisobingiz yo'qmi?

                <a href="/register/">
                    Ro'yxatdan o‘tish
                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
